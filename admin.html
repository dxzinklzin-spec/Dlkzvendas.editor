<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin - Dlkz77cc</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.top{
padding:15px;
background:#111;
display:flex;
justify-content:space-between;
}

.container{
padding:15px;
max-width:1000px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
}

.big{
font-size:22px;
color:#00ffcc;
}

.item{
background:#111;
padding:10px;
margin-top:10px;
border-radius:8px;
}

button{
margin-top:5px;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.done{background:#00ffcc;}
.del{background:#ff4d4d;color:white;}

.green{color:#00ffcc;}
.yellow{color:#ffcc00;}

</style>
</head>

<body>

<div class="top">
<div>📊 PAINEL ADMIN</div>
<div>DLKZ77CC EDITZ</div>
</div>

<div class="container">

<!-- DASHBOARD -->
<div class="grid">

<div class="card">
<div>💰 Ganhos</div>
<div class="big">R$ <span id="ganhos">0</span></div>
</div>

<div class="card">
<div>📦 Pedidos</div>
<div class="big" id="pedidos">0</div>
</div>

<div class="card">
<div>👥 Clientes</div>
<div class="big" id="clientes">0</div>
</div>

<div class="card">
<div>👁️ Visitas</div>
<div class="big" id="visitas">0</div>
</div>

</div>

<!-- PEDIDOS -->
<div class="card">
<h3>📋 Pedidos</h3>
<div id="listaPedidos"></div>
</div>

<!-- FEEDBACK -->
<div class="card">
<h3>⭐ Feedback</h3>
<div id="listaFeed"></div>
</div>

</div>

<script>

/* PEGAR DADOS DO LOCALSTORAGE */
let ganhos = Number(localStorage.getItem("ganhos")) || 0;
let pedidos = JSON.parse(localStorage.getItem("pedidos") || "[]");
let clientes = JSON.parse(localStorage.getItem("clientes") || "[]");
let feed = JSON.parse(localStorage.getItem("feed") || "[]");
let visitas = localStorage.getItem("visitasApp") || 0;

/* RENDER DASHBOARD */
document.getElementById("ganhos").innerText = ganhos;
document.getElementById("pedidos").innerText = pedidos.length;
document.getElementById("clientes").innerText = clientes.length;
document.getElementById("visitas").innerText = visitas;

/* LISTA PEDIDOS */
function renderPedidos(){
let box = document.getElementById("listaPedidos");
box.innerHTML="";

pedidos.forEach((p,i)=>{
let div = document.createElement("div");
div.className="item";

div.innerHTML=`
<b>${p.nome}</b><br>
${p.desc}<br>
<span class="yellow">Status: ${p.status}</span><br>

<button class="done" onclick="concluir(${i})">Concluir</button>
<button class="del" onclick="del(${i})">Excluir</button>
`;

box.appendChild(div);
});
}

/* CONCLUIR PEDIDO */
function concluir(i){
pedidos[i].status="Concluído";
localStorage.setItem("pedidos",JSON.stringify(pedidos));
renderPedidos();
}

/* EXCLUIR PEDIDO */
function del(i){
pedidos.splice(i,1);
localStorage.setItem("pedidos",JSON.stringify(pedidos));
renderPedidos();
}

/* FEEDBACK */
function renderFeed(){
let box=document.getElementById("listaFeed");
box.innerHTML="";

feed.forEach(f=>{
let div=document.createElement("div");
div.className="item";
div.innerHTML=`⭐ ${f.nota}/10 - ${f.coment}`;
box.appendChild(div);
});
}

/* INIT */
renderPedidos();
renderFeed();

</script>

</body>
</html>
